services:
  postgres:
    image: postgres:17-alpine
    container_name: sistema_igrejas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sistema_igrejas
    ports:
      - "5433:5432"
    volumes:
      - sistema_igrejas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sistema_igrejas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sistema_igrejas_postgres_data:
